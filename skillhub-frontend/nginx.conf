server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
 
    # Redirige toutes les routes vers index.html
    # Indispensable pour React Router — sans ça un refresh
    # sur /formations ou /dashboard/apprenant renvoie 404
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # Cache les assets statiques (JS, CSS, images)
    # Le hash dans le nom de fichier (généré par Vite)
    # garantit que le cache est invalidé à chaque nouveau build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
 
    # Désactive les logs d'accès pour favicon.ico
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}