# ─────────────────────────────────────────────────────────────────
# docker-compose.yml
# Rôle : orchestre les 5 services de la stack SkillHub V2
#
# Ordre de démarrage :
#   1. db (MySQL)
#   2. mongodb
#   3. skillhub-auth (Spring Boot) — attend db
#   4. skillhub-backend (Laravel)  — attend db + skillhub-auth
#   5. skillhub-frontend (React)   — attend skillhub-backend
#
# Lancement : docker compose up --build
# ─────────────────────────────────────────────────────────────────

services:
  # ── MySQL ───────────────────────────────────────────────────────
  db:
    image: mysql:8-debian
    container_name: skillhub-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      # Volume nommé pour persister les données MySQL
      # Sans ça, toutes les données sont perdues à chaque restart
      - mysql_data:/var/lib/mysql
    networks:
      - skillhub-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    cpus: "0.5"

  # ── MongoDB ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:6-jammy
    container_name: skillhub-mongodb
    ports:
      - "27018:27017"
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    volumes:
      # Volume nommé pour persister les logs MongoDB
      - mongo_data:/data/db
    networks:
      - skillhub-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 256m
    cpus: "0.3"

  # ── Spring Boot (Auth) ──────────────────────────────────────────
  skillhub-auth:
    build:
      context: ./skillhub-auth
      dockerfile: Dockerfile
    container_name: skillhub-auth
    restart: unless-stopped
    environment:
      # Override de application-docker.properties
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_MASTER_KEY: ${APP_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - skillhub-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      disable: true
      # test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      # interval: 15s
      # timeout: 5s
      # retries: 5
      # start_period: 60s
    mem_limit: 512m
    cpus: "0.5"

  # ── Laravel (Backend métier) ────────────────────────────────────
  skillhub-backend:
    build:
      context: ./skillhub-backend
      dockerfile: Dockerfile
    container_name: skillhub-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      # "db" = nom du service MySQL dans ce docker-compose
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # "mongodb" = nom du service MongoDB dans ce docker-compose
      MONGO_URI: mongodb://mongodb:27017
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      # "skillhub-auth" = nom du service Spring Boot
      AUTH_SERVICE_URL: http://skillhub-auth:8080
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8000:8000"
    networks:
      - skillhub-network
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      # skillhub-auth:
      #   condition: service_healthy
    mem_limit: 512m
    cpus: "0.5"

  # ── React/nginx (Frontend) ──────────────────────────────────────
  skillhub-frontend:
    build:
      context: ./skillhub-frontend
      dockerfile: Dockerfile
    container_name: skillhub-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - skillhub-network
    depends_on:
      - skillhub-backend
    mem_limit: 128m
    cpus: "0.2"

# ── Volumes nommés ───────────────────────────────────────────────
# Les données persistent même si les conteneurs sont supprimés
volumes:
  mysql_data:
  mongo_data:

# ── Réseau interne isolé ─────────────────────────────────────────
# Les services communiquent entre eux via leurs noms
# (db, mongodb, skillhub-auth...) sans exposer leurs ports
# sur la machine hôte sauf ceux définis dans "ports:"
networks:
  skillhub-network:
    driver: bridge
