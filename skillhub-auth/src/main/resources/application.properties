# ─────────────────────────────────────────────────────────────────
# application.properties
# Rôle : configuration principale de Spring Boot
#
# ⚠️  Ce fichier est commité sur Git — il ne doit contenir
#     AUCUNE valeur sensible réelle en production.
#     Les valeurs sensibles (mot de passe, clés) doivent être
#     dans un .env non commité ou dans les secrets Docker/CI
# ─────────────────────────────────────────────────────────────────


# ── Base de données MySQL ─────────────────────────────────────────
# URL de connexion à MySQL avec deux paramètres importants :
#   useSSL=false      → désactive SSL en local (pas nécessaire)
#   serverTimezone=UTC → évite les erreurs de fuseau horaire
#
# ⚠️  En Docker, localhost devient le nom du service :
#     jdbc:mysql://db:3306/skillhub_db
#     Ce sera overridé dans application-docker.properties
spring.datasource.url=jdbc:mysql://localhost:3306/skillhub_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ── JPA / Hibernate ───────────────────────────────────────────────
# ddl-auto=update : Hibernate met à jour le schéma BDD
# automatiquement au démarrage si les entités ont changé
#
# ⚠️  Ne jamais utiliser "update" en production —
#     utiliser "validate" pour éviter les modifications
#     accidentelles du schéma
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL générées par Hibernate dans les logs
# Utile en développement pour déboguer, à désactiver en production
spring.jpa.show-sql=true

# Dialecte MySQL 8 — indique à Hibernate la syntaxe SQL à utiliser
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# ── Serveur ───────────────────────────────────────────────────────
# Spring Boot tourne sur le port 8080
# React (5173) et Laravel (8000) utilisent des ports différents
# Le CORS dans CorsConfig.java autorise les appels entre ces ports
server.port=8080


# ── Clés secrètes ─────────────────────────────────────────────────
# ⚠️  CES VALEURS NE DOIVENT PAS ÊTRE COMMITÉES EN PRODUCTION
#     Les remplacer par des variables d'environnement dans .env
#     et ajouter .env dans .gitignore

# Clé de chiffrement AES-256 utilisée par EncryptionService
# Doit faire exactement 32 caractères pour AES-256
app.master.key=SkillHub2026MasterKey32Chars!!XY

# Clé secrète pour signer les tokens JWT dans JwtService
# Plus elle est longue et aléatoire, plus les tokens sont sécurisés
jwt.secret=skillhub-secret-key-2026-très-longue-pour-être-sécurisée