# ─────────────────────────────────────────────────────────────────
# application-docker.properties
# Rôle : override de application.properties quand Docker tourne
#
# Activé automatiquement grâce à :
#   ENV SPRING_PROFILES_ACTIVE=docker dans le Dockerfile
#
# Dans Docker, les services communiquent via leurs noms définis
# dans docker-compose.yml — "localhost" n'existe plus,
# on utilise le nom du service "db" à la place
# ─────────────────────────────────────────────────────────────────

# ── Base de données MySQL ─────────────────────────────────────────
# "db" = nom du service MySQL dans docker-compose.yml
# Ces valeurs sont lues depuis le fichier .env via docker-compose
spring.datasource.url=jdbc:mysql://db:3306/${DB_DATABASE}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# En Docker on utilise "validate" et non "update"
# pour éviter que Hibernate modifie le schéma accidentellement
spring.jpa.hibernate.ddl-auto=update

# Désactivé en production — trop verbeux dans les logs Docker
spring.jpa.show-sql=false

# ── Clés secrètes ─────────────────────────────────────────────────
# Injectées depuis le .env via docker-compose.yml
# Ne jamais mettre de valeurs réelles ici
app.master.key=${APP_MASTER_KEY}
jwt.secret=${JWT_SECRET}