services:

  db:
    image: mysql:8-debian
    container_name: skillhub-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - skillhub-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:6-jammy
    container_name: skillhub-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - skillhub-network

  skillhub-auth:
    build:
      context: ./skillhub-auth
      dockerfile: Dockerfile
    container_name: skillhub-auth
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_MASTER_KEY: ${APP_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - skillhub-network
    depends_on:
      db:
        condition: service_healthy

  skillhub-backend:
    build:
      context: ./skillhub-backend
      dockerfile: Dockerfile
    container_name: skillhub-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      AUTH_SERVICE_URL: http://skillhub-auth:8080
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8000:8000"
    networks:
      - skillhub-network
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started

  skillhub-frontend:
    build:
      context: ./skillhub-frontend
      dockerfile: Dockerfile
    container_name: skillhub-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - skillhub-network
    depends_on:
      - skillhub-backend

volumes:
  mysql_data:
  mongo_data:

networks:
  skillhub-network:
    driver: bridge